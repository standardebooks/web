#NewsletterSubscriptions

RewriteRule	^/newsletter$							/newsletter-subscriptions/new.php

RewriteRule	^/users/([^/\.]+?)/newsletter-subscriptions$			/users/newsletter-subscriptions/index.php?user-identifier=$1

# We may also get a `GET` request with HTTP methods passed via query string for a `list-unsubscribe` header, i.e. `/users/aaa-bbb-ccc/newsletter-subscriptions/456?_method=DELETE`.
RewriteRule	^/users/([^/\.]+?)/newsletter-subscriptions/([\d]+)$		/newsletter-subscriptions/http-router.php?user-identifier=$1&newsletter-id=$2 [QSA]


# NewsletterMailings

# Route requests for a specific resource.
RewriteRule	^/newsletter-mailings/([\d]+)$					/newsletter-mailings/http-router.php?newsletter-mailing-id=$1

# Route requests for forms applying to a specific resource.
RewriteRule	^/newsletter-mailings/([\d]+)/(delete|edit)$			/newsletter-mailings/$2.php?&newsletter-mailing-id=$1
