# Rewrite `/blog/*` to `blog-posts/*`.
# Restart the request because we alreayd processed `/index.php` rules before we hit this rule.
RewriteRule	^/blog($|/.+$)					/blog-posts$1 [N,QSA]

# Route requests for a specific resource.
RewriteRule	^/blog-posts/([^/\.]+)$				/blog-posts/http-router.php?blog-post-url-title=$1

# Route requests for forms applying to a specific resource.
RewriteRule	^/blog-posts/([^/\.]+)/(delete|edit)$		/blog-posts/$2.php?blog-post-url-title=$1
