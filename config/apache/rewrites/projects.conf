RewriteRule	^/ebooks/([^\.]+?)/projects/new$		/projects/new.php?ebook-url-path=$1

RewriteRule	^/projects/([\d]+)/edit$			/projects/edit.php?project-id=$1

# Query string may contain `indent=<BOOL>`.
RewriteRule	^/projects/([\d]+)/reviewer$			/projects/reviewer/http-get.php?project-id=$1 [QSA]

# Query string may contain `indent=<BOOL>`.
RewriteRule	^/ebooks/(.+?)/projects/in-progress/reviewer$	/projects/reviewer/http-get.php?url-path=$1 [QSA]

RewriteRule	^/projects/([\d]+)$				/projects/http-router.php?project-id=$1 [L]
